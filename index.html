                            {/* MODAL DETALLE DE BLOG */}
                            {selectedPost && (
                                <div className="fixed inset-0 z-[120] flex items-center justify-center p-0 sm:p-6 modal-overlay animate-fade-in" onClick={() => setSelectedPost(null)}>
                                    <div className="bg-brand-bg1 w-full h-full sm:max-h-[90vh] sm:max-w-4xl sm:rounded-[2.5rem] overflow-hidden shadow-2xl relative animate-zoom-in flex flex-col border border-white/10" onClick={e => e.stopPropagation()}>
                                        <button onClick={() => setSelectedPost(null)} className="absolute top-4 right-4 z-30 bg-black/40 backdrop-blur-md text-white p-2 rounded-full shadow-lg hover:bg-black transition-colors"><X className="w-6 h-6" /></button>
                                        
                                        <div className="flex-1 overflow-y-auto hide-scroll bg-brand-bg1">
                                            {selectedPost.cleanImg && (
                                                <div className="w-full relative shadow-md">
                                                    <img src={selectedPost.cleanImg} className="w-full h-auto object-cover" alt="Detalle" />
                                                </div>
                                            )}
                                            <div className={`p-6 sm:p-12 ${!selectedPost.cleanImg ? 'pt-20' : ''}`}>
                                                <div className="flex gap-3 mb-5">
                                                    <span className="bg-brand-dark text-brand-bg1 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-sm">{selectedPost.Etiqueta || 'Novedad'}</span>
                                                    <span className="text-brand-dark/60 text-xs font-bold uppercase py-1.5">{selectedPost.Fecha}</span>
                                                </div>
                                                <h2 className="text-4xl sm:text-5xl font-black text-brand-dark leading-tight mb-8 drop-shadow-sm">{selectedPost.Titulo}</h2>
                                                <div className="text-brand-dark/90 font-medium leading-relaxed whitespace-pre-wrap text-base sm:text-lg">
                                                    {selectedPost.Contenido || selectedPost.Descripcion}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* MODAL REPRODUCTOR DE VIDEO */}
                            {selectedVideo && (() => {
                                const videoReto = activeChallenges.find(r => String(r.Titulo).toLowerCase().includes('video'));
                                const isReclamado = videoReto && evidenciasList.some(e => e.Reto === videoReto.Titulo && e.URL_Evidencia === selectedVideo.id && e.Estado === 'Aprobado');
                                
                                return (
                                    <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in" onClick={() => setSelectedVideo(null)}>
                                        <div className="bg-black w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl relative aspect-video flex flex-col" onClick={e => e.stopPropagation()}>
                                            <div className="absolute top-4 right-4 z-30 flex gap-2">
                                                {isReclamado ? (
                                                    <div className="bg-green-500/90 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-wider backdrop-blur-md shadow-lg flex items-center gap-1"><CheckCircle className="w-3 h-3"/> Reclamado</div>
                                                ) : (
                                                    videoReto && <button onClick={completeVideoChallenge} disabled={loading} className="bg-orange-500/90 text-white px-4 py-2 rounded-full font-black text-[10px] uppercase tracking-wider hover:bg-orange-600 backdrop-blur-md shadow-lg">{loading ? '...' : 'Terminé de verlo (+ Pts)'}</button>
                                                )}
                                                <button onClick={() => setSelectedVideo(null)} className="bg-black/50 text-white p-2 rounded-full hover:bg-black transition-colors"><X className="w-5 h-5" /></button>
                                            </div>
                                            <div className="flex-1 w-full h-full relative">
                                                {selectedVideo.type === 'youtube' && <iframe src={`https://www.youtube.com/embed/${selectedVideo.id}?autoplay=1&rel=0&modestbranding=1`} className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen"></iframe>}
                                                {selectedVideo.type === 'drive' && <iframe src={`https://drive.google.com/file/d/${selectedVideo.id}/preview`} className="absolute inset-0 w-full h-full border-0" allow="autoplay; fullscreen"></iframe>}
                                                {!selectedVideo.type && <div className="absolute inset-0 flex items-center justify-center text-white/50 font-bold text-sm">Video no disponible.</div>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
