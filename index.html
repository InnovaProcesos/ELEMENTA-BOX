            AlertCircle: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Clock: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Target: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Camera: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Upload: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            CheckCircle: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Database: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Info: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
            Flame: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
            ExternalLink: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        };
        const { Play, BookOpen, Users, LogOut, UserCircle, Activity, Lock, Video, Search, ChevronDown, ChevronUp, X, Trophy, AlertCircle, Clock, Target, Camera, Upload, CheckCircle, Database, Info, Flame, ExternalLink } = Icons;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1q7_Mxg8fdtxlz-_whq6bGc8QbqJwTaaEkgyrGgMbnwPe8sHfNkShZgUQnTKWUT99/exec"; 
        const API_SECRET = "ElementsBox_Seguridad_2026";

        const customStyles = `
        :root { --color-brand-bg1: 229 211 189; --color-brand-bg2: 212 188 160; --color-brand-dark: 42 36 31; }
        .bg-brand-bg1 { background-color: rgb(var(--color-brand-bg1)); }
        .bg-brand-dark { background-color: rgb(var(--color-brand-dark)); }
        .text-brand-bg1 { color: rgb(var(--color-brand-bg1)); }
        .text-brand-dark { color: rgb(var(--color-brand-dark)); }
        .border-brand-dark { border-color: rgb(var(--color-brand-dark)); }
        .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 15px 35px -5px rgba(0,0,0,0.15); }
        .modal-overlay { background: rgba(10, 8, 7, 0.95); backdrop-filter: blur(10px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 10s infinite; }
        .animation-delay-2000 { animation-delay: 2s; } .animation-delay-4000 { animation-delay: 4s; }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } } .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } } .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } } .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        `;

        const normalizeKeys = (dataArray) => {
            if (!Array.isArray(dataArray)) return [];
            return dataArray.map(obj => { 
                const newObj = {}; 
                for (let key in obj) newObj[String(key).trim()] = obj[key]; 
                return newObj; 
            });
        };

        const getVideoData = (url) => {
            if (!url) return { type: null, id: null };
            const safeUrl = String(url);
            const ytRegex = new RegExp("^.*(youtu\\.be\\/|v\\/|u\\/\\w\\/|embed\\/|watch\\?v=|\\&v=)([^#\\&\\?]*).*");
            const ytMatch = safeUrl.match(ytRegex);
            if (ytMatch && ytMatch[2].length === 11) return { type: 'youtube', id: ytMatch[2] };
            const driveRegex = new RegExp("(?:\\/d\\/|id=)([a-zA-Z0-9_-]+)");
            const driveMatch = safeUrl.match(driveRegex);
            if (driveMatch) return { type: 'drive', id: driveMatch[1] };
            return { type: null, id: null };
        };

        const normalizeImageUrl = (url) => {
            if (!url) return '';
            const safeUrl = String(url);
            const driveRegex = new RegExp("(?:\\/d\\/|id=)([a-zA-Z0-9_-]+)");
            const driveMatch = safeUrl.match(driveRegex);
            if (driveMatch) return `https://lh3.googleusercontent.com/d/${driveMatch[1]}`;
            return safeUrl;
        };

        const safeDateStr = (dateStr) => {
            if(!dateStr) return '';
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? '' : d.toISOString().split('T')[0];
        };

        const formatearFecha = (fechaString) => {
            if (!fechaString) return 'N/A';
            const date = new Date(fechaString);
            if(isNaN(date.getTime())) return String(fechaString);
            const utcDate = new Date(date.getTime() + date.getTimezoneOffset() * 60000);
            return utcDate.toLocaleDateString('es-CO', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        const calculateStreak = (dateStrings) => {
            if(!dateStrings || dateStrings.length === 0) return 0;
            const uniqueDates = [...new Set(dateStrings.map(d => {
                const date = new Date(d);
                return new Date(date.getTime() + date.getTimezoneOffset() * 60000).setHours(0,0,0,0);
            }))].sort((a,b) => b - a);
            
            const today = new Date().setHours(0,0,0,0);
            const yesterday = today - 86400000;
            
            let streak = 0;
            let currentCheck = uniqueDates[0] === today ? today : (uniqueDates[0] === yesterday ? yesterday : null);
            
            if(currentCheck !== null) {
                for(let d of uniqueDates) {
                    if(d === currentCheck) {
                        streak++;
                        currentCheck -= 86400000;
                    } else break;
                }
            }
            return streak;
        };

        // COMPRESOR DE IMÁGENES AUTOMÁTICO (Evita que el navegador se congele)
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                    return;
                }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        const Loader = () => <div className="flex justify-center py-12"><div className="w-10 h-10 border-4 border-brand-dark border-t-transparent rounded-full animate-spin"></div></div>;

        function App() {
            const [user, setUser] = useState(null); 
            const [currentView, setCurrentView] = useState('login'); 
            const [loading, setLoading] = useState(false);
            const [dataLoading, setDataLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');

            // Data States
            const [videos, setVideos] = useState([]);
            const [blogPosts, setBlogPosts] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [rankingList, setRankingList] = useState([]);
            const [retosList, setRetosList] = useState([]);
            const [evidenciasList, setEvidenciasList] = useState([]);
            const [userConexiones, setUserConexiones] = useState([]);
            const [opcionesObservacion, setOpcionesObservacion] = useState([]);
            
            // Interaction States
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedCategories, setExpandedCategories] = useState({});
            const [selectedPost, setSelectedPost] = useState(null); 
            const [selectedVideo, setSelectedVideo] = useState(null); 
            const [restrictedPopup, setRestrictedPopup] = useState(false);
            const [uploadingReto, setUploadingReto] = useState(null);
            const [previewImgUrl, setPreviewImgUrl] = useState(null);

            // Admin States
            const [adminTab, setAdminTab] = useState('evidencias'); 
            const [adminDataSheets] = useState(['INFO PERSONAS', 'VIDEOS', 'RETOS', 'BLOG', 'DATOS', 'PLANES', 'ADMINISTRATIVOS', 'TRAZABILIDAD']);
            const [selectedAdminSheet, setSelectedAdminSheet] = useState('INFO PERSONAS');
            const [adminSheetData, setAdminSheetData] = useState([]);
            const [editingGenericRow, setEditingGenericRow] = useState(null);
            const [adminEvidencias, setAdminEvidencias] = useState([]);
            const [adminEvalEvidencia, setAdminEvalEvidencia] = useState(null);

            useEffect(() => {
                try {
                    const sessionUser = localStorage.getItem('elementsSession');
                    if(sessionUser) {
                        const parsedUser = JSON.parse(sessionUser);
                        setUser(parsedUser);
                        setCurrentView('dashboard');
                        fetchData(parsedUser.role, parsedUser.status, parsedUser.email);
                    }
                } catch (e) {}
            }, []);

            useEffect(() => {
                if(evidenciasList.length > 0 && typeof confetti === 'function') {
                    try {
                        const notified = JSON.parse(localStorage.getItem('notifiedChallenges') || '[]');
                        let shouldAnimate = false;
                        const newNotified = [...notified];

                        evidenciasList.forEach(ev => {
                            if(ev.Estado === 'Aprobado' && !notified.includes(ev.ID_Evidencia)) {
                                shouldAnimate = true;
                                newNotified.push(ev.ID_Evidencia);
                            }
                        });

                        if(shouldAnimate) {
                            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#E5D3BD', '#2A241F', '#4ade80', '#eab308'] });
                            localStorage.setItem('notifiedChallenges', JSON.stringify(newNotified));
                        }
                    } catch(e) {}
                }
            }, [evidenciasList]);

            const apiCall = async (action, payload) => {
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain' }, 
                        body: JSON.stringify({ action, payload, apiSecret: API_SECRET })
                    });
                    return await response.json();
                } catch (error) { return { status: 'error', message: 'Error de red.' }; }
            };

            const handleAuth = async (e, action) => {
                e.preventDefault(); setErrorMsg(''); setLoading(true);
                let payload = { email: e.target.email.value, password: e.target.password.value };
                if (action === 'register') {
                    payload = {
                        ...payload, nombres: e.target.nombres.value, apellidos: e.target.apellidos.value, 
                        cedula: e.target.cedula.value, telefono: e.target.telefono.value, eps: e.target.eps.value, 
                        fechaNac: e.target.fechaNac.value, contactoEmergencia: e.target.contactoEmergencia.value, 
                        parentesco: e.target.parentesco.value
                    };
                }
                const res = await apiCall(action, payload);
                if (res.status === 'success') {
                    setUser(res.user); 
                    try { localStorage.setItem('elementsSession', JSON.stringify(res.user)); } catch(e){} 
                    setCurrentView('dashboard'); 
                    fetchData(res.user.role, res.user.status, res.user.email);
                } else { setErrorMsg(res.message); }
                setLoading(false);
            };

            const handleLogout = () => { 
                setUser(null); setCurrentView('login'); 
                try { localStorage.removeItem('elementsSession'); } catch(e){}
            };

            const handleNavigation = (view) => {
                if (['academy', 'ranking'].includes(view) && user?.role !== 'admin' && String(user?.status || '').trim().toLowerCase() !== 'activo') {
                    setRestrictedPopup(true); return;
                }
                setCurrentView(view); window.scrollTo(0, 0);
            };

            const fetchData = async (role, userStatus, email) => {
                setDataLoading(true);
                try {
                    const resBlog = await apiCall('getBlog', {});
                    if (resBlog.status === 'success') setBlogPosts(normalizeKeys(resBlog.data).reverse()); 

                    if (role === 'admin' || String(userStatus || '').trim().toLowerCase() === 'activo') {
                        const [resVideos, resRanking, resRetos, resEvidencias, resConexiones] = await Promise.all([
                            apiCall('getVideos', {}), apiCall('getRanking', {}), apiCall('getRetos', {}), apiCall('getEvidenciasUser', { email }), apiCall('getUserStats', { email })
                        ]);
                        
                        if (resVideos.status === 'success') {
                            const cv = normalizeKeys(resVideos.data); 
                            setVideos(cv);
                            if(cv.length > 0) setExpandedCategories({ [cv[0].Categoria || 'General']: true });
                        }
                        if (resRanking.status === 'success') setRankingList(normalizeKeys(resRanking.data));
                        if (resRetos.status === 'success') setRetosList(normalizeKeys(resRetos.data).reverse());
                        if (resEvidencias.status === 'success') setEvidenciasList(normalizeKeys(resEvidencias.data));
                        if (resConexiones.status === 'success') setUserConexiones(resConexiones.data);
                    }

                    if (role === 'admin') {
                        fetchAdminSheetData(selectedAdminSheet);
                        const evAdmin = await apiCall('getEvidenciasAdmin', { adminRole: 'admin' });
                        if(evAdmin.status === 'success') setAdminEvidencias(normalizeKeys(evAdmin.data).reverse());
                        const obsCall = await apiCall('getObservaciones', { adminRole: 'admin' });
                        if(obsCall.status === 'success') setOpcionesObservacion(obsCall.data);
                    }
                } catch (err) {} finally { setDataLoading(false); }
            };

            // ---- RETOS Y LÓGICAS DE PROGRESO ----
            const activeChallenges = useMemo(() => {
                const hoy = new Date().getTime();
                return retosList.filter(r => {
                    if(!r['Fecha de Inicio'] || !r['Fecha de Fin']) return true; 
                    const start = new Date(r['Fecha de Inicio']).getTime();
                    const end = new Date(r['Fecha de Fin']).getTime() + 86400000; 
                    return hoy >= start && hoy <= end;
                });
            }, [retosList]);

            const userStreak = useMemo(() => calculateStreak(userConexiones), [userConexiones]);
            const misPuntos = rankingList.find(r => String(r.Nombre || r.Nombres || '').toLowerCase() === String(user?.name || '').toLowerCase() || String(r.Correo || '').toLowerCase() === String(user?.email || '').toLowerCase())?.Puntos || 0;

            const verificarCaducidad = (fechaCaducidad) => {
                if (!fechaCaducidad) return null;
                const expDate = new Date(fechaCaducidad);
                if(isNaN(expDate.getTime())) return null;
                const utcDate = new Date(expDate.getTime() + expDate.getTimezoneOffset() * 60000);
                const today = new Date().setHours(0,0,0,0); 
                utcDate.setHours(0,0,0,0);
                
                const diffDays = Math.ceil((utcDate - today) / (1000 * 60 * 60 * 24));

                if (0 > diffDays) return { estado: 'vencido', mensaje: 'Tu suscripción está VENCIDA', dias: diffDays };
                if (0 === diffDays) return { estado: 'alerta', mensaje: 'Tu membresía vence HOY', dias: diffDays };
                if (5 >= diffDays) return { estado: 'aviso', mensaje: `¡Alerta! Vence en ${diffDays} día(s)`, dias: diffDays };
                return null;
            };

            const infoCaducidad = user && !String(user.plan || '').includes('12 Clases') ? verificarCaducidad(user.caducidad) : null;

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if(file) { setPreviewImgUrl(URL.createObjectURL(file)); } 
                else { setPreviewImgUrl(null); }
            };

            const handleEvidenceSubmit = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const fileInput = e.target.imagen.files[0];
                
                if (!fileInput) {
                    setErrorMsg("Selecciona un archivo."); setLoading(false); return;
                }

                if(fileInput.size > 8 * 1024 * 1024) {
                    setErrorMsg("El archivo pesa más de 8MB. Intenta subir una foto comprimida o un video muy corto.");
                    setLoading(false); return;
                }

                let base64 = await compressImage(fileInput);
                const res = await apiCall('submitEvidence', {
                    email: user.email, retoTitulo: uploadingReto.Titulo, puntos: uploadingReto.Puntos, base64: base64, filename: fileInput.name
                });
                
                if(res.status === 'success') { 
                    setSuccessMsg('Evidencia enviada para validación.');
                    setUploadingReto(null); setPreviewImgUrl(null);
                    fetchData(user.role, user.status, user.email); 
                } else setErrorMsg(res.message);
                setLoading(false); setTimeout(() => setSuccessMsg(''), 4000);
            };

            const completeVideoChallenge = async () => {
                if(!selectedVideo || !selectedVideo.id) return;
                const videoReto = activeChallenges.find(r => String(r.Titulo).toLowerCase().includes('video'));
                if(!videoReto) { alert("El reto de ver videos no está vigente en este momento."); return; }

                setLoading(true);
                const res = await apiCall('markVideoWatched', { email: user.email, videoId: selectedVideo.id, retoTitulo: videoReto.Titulo, puntos: videoReto.Puntos });
                if(res.status === 'success') {
                    setSuccessMsg('¡Puntos de video sumados a tu ranking!');
                    fetchData(user.role, user.status, user.email);
                } else { alert(res.message); }
                setLoading(false);
            };

            // ---- GESTION DE ADMINISTRADOR ----
            const handleAdminValidateEvidence = async (e) => {
                e.preventDefault(); setLoading(true);
                const obs = e.target.observacion.value;
                const estado = e.target.decision.value;
                
                const res = await apiCall('validateEvidence', { 
                    adminRole: user.role, idEvidencia: adminEvalEvidencia.ID_Evidencia, nuevoEstado: estado, observacion: obs 
                });
                if(res.status === 'success') {
                    setAdminEvalEvidencia(null);
                    const evAdmin = await apiCall('getEvidenciasAdmin', { adminRole: 'admin' });
                    if(evAdmin.status === 'success') setAdminEvidencias(normalizeKeys(evAdmin.data).reverse());
                }
                setLoading(false);
            };

            const fetchAdminSheetData = async (sheetName) => {
                setDataLoading(true);
                const res = await apiCall('getGenericSheet', { adminRole: user.role, sheetName });
                if(res.status === 'success') setAdminSheetData(res.data);
                setDataLoading(false);
            };

            const handleGenericUpdate = async (e) => {
                e.preventDefault(); setLoading(true);
                const formData = new FormData(e.target);
                const dataToSave = {};
                for(let [key, value] of formData.entries()) { dataToSave[key] = value; }
                
                const res = await apiCall('updateGenericRow', { 
                    adminRole: user.role, sheetName: selectedAdminSheet, 
                    rowIndex: editingGenericRow._rowIndex, data: dataToSave 
                });
                
                if(res.status === 'success') {
                    setEditingGenericRow(null);
                    fetchAdminSheetData(selectedAdminSheet);
                } else { alert("Error al guardar: " + res.message); }
                setLoading(false);
            };

            const handleAdminAddBlog = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg(''); setSuccessMsg('');
                const fileInput = e.target.imagen ? e.target.imagen.files[0] : null;
                let base64 = null; let filename = null;
                if (fileInput) {
                    setSuccessMsg('Preparando imagen...');
                    base64 = await compressImage(fileInput);
                    filename = fileInput.name;
                }
                
                let imageUrl = '';
                if(base64) {
                    const upload = await apiCall('uploadImage', { adminRole: user.role, base64: base64, filename: filename });
                    if(upload.status === 'success') imageUrl = upload.url;
                }

                const res = await apiCall('addBlog', {
                    adminRole: user.role, titulo: e.target.titulo.value, etiqueta: e.target.etiqueta.value,
                    descripcion: e.target.descCorta.value, 
                    descripcionCorta: e.target.descCorta.value, contenido: e.target.contenido.value,
                    autor: e.target.autor.value, urlImagen: imageUrl
                });
                if(res.status === 'success') { setSuccessMsg('Noticia publicada'); e.target.reset(); fetchData(user.role, user.status, user.email); } 
                else setErrorMsg(res.message);
                setLoading(false); setTimeout(() => setSuccessMsg(''), 4000);
            };

            const groupedFilteredVideos = useMemo(() => {
                const lowerSearch = String(searchTerm || '').toLowerCase();
                const filtered = videos.filter(v => String(v.Nombre || '').toLowerCase().includes(lowerSearch) || String(v.Descripcion || '').toLowerCase().includes(lowerSearch));
                return filtered.reduce((acc, v) => {
                    const cat = v.Categoria || 'General';
                    if (!acc[cat]) acc[cat] = []; acc[cat].push(v); return acc;
                }, {});
            }, [videos, searchTerm]);

            const toggleCategory = (cat) => setExpandedCategories(prev => ({ ...prev, [cat]: !prev[cat] }));

            const Topbar = () => (
                <div className="sticky top-0 z-[100] bg-brand-bg1/90 backdrop-blur-xl px-6 py-4 flex justify-between items-center shadow-sm border-b border-white/20">
                    <div className="flex items-center gap-2">
                        <div className="bg-brand-dark p-2 rounded-lg shadow-lg"><Activity className="w-5 h-5 text-brand-bg1" /></div>
                        <span className="font-black text-xl tracking-widest uppercase text-brand-dark">Elements</span>
                    </div>
                    {user && (
                        <button onClick={handleLogout} className="flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-black/5 transition-colors text-brand-dark/80 font-bold text-xs uppercase tracking-wider">
                            Salir <LogOut className="w-4 h-4" />
                        </button>
                    )}
                </div>
            );

            const BottomNav = () => (
                <div className="fixed bottom-4 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-brand-dark/95 backdrop-blur-lg p-2 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.4)] flex justify-between items-center z-[100] border border-white/10">
                    {['dashboard', 'academy', 'ranking', 'blog'].map(view => {
                        const isApp = currentView === view;
                        const icons = { dashboard: UserCircle, academy: Video, ranking: Trophy, blog: BookOpen };
                        const labels = { dashboard: 'Inicio', academy: 'Aprende', ranking: 'Ranking', blog: 'Blog' };
                        const Icon = icons[view];
                        return (
                            <button key={view} onClick={() => handleNavigation(view)} className={`relative flex items-center justify-center p-3 rounded-full transition-all duration-300 ${isApp ? 'bg-brand-bg1 w-28 text-brand-dark shadow-md' : 'text-white/60 hover:text-white flex-1'}`}>
                                <Icon className="w-5 h-5" />
                                {isApp && <span className="ml-1.5 text-xs font-black uppercase tracking-wider animate-fade-in">{labels[view]}</span>}
                            </button>
                        );
                    })}
                    {user?.role === 'admin' && (
                        <button onClick={() => handleNavigation('admin')} className={`relative flex items-center justify-center p-3 rounded-full transition-all duration-300 ${currentView === 'admin' ? 'bg-brand-bg1 w-28 text-brand-dark shadow-md' : 'text-white/60 hover:text-white flex-1'}`}>
                            <Database className="w-5 h-5" />
                            {currentView === 'admin' && <span className="ml-1.5 text-xs font-black uppercase tracking-wider animate-fade-in">Admin</span>}
                        </button>
                    )}
                </div>
            );

            return (
                <div className="relative min-h-screen overflow-x-hidden bg-brand-bg1 text-brand-dark font-sans selection:bg-brand-dark selection:text-white">
                    <style dangerouslySetInnerHTML={{ __html: customStyles }} />
                    <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-0 -left-10 w-72 h-72 bg-[#f4e6d4] rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
                        <div className="absolute top-40 right-0 w-80 h-80 bg-[#cbb092] rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
                        <div className="absolute -bottom-20 left-20 w-96 h-96 bg-[#dfc5a6] rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>
                    </div>

                    <div className="relative z-10 pb-32">
                        {(user || currentView !== 'login') && <Topbar />}

                        <div className="max-w-4xl mx-auto px-4 pt-6">
                            
                            {/* LOGIN & REGISTER */}
                            {!user && (currentView === 'login' || currentView === 'register') && (
                                <div className="flex flex-col items-center justify-center animate-slide-up py-10">
                                    <div className="mb-8 flex flex-col items-center">
                                        <div className="w-24 h-24 rounded-[2rem] bg-brand-dark flex items-center justify-center shadow-2xl mb-4 rotate-3 border-4 border-white/20"><Activity className="w-12 h-12 text-brand-bg1 -rotate-3" /></div>
                                        <h1 className="text-4xl font-black uppercase tracking-widest text-brand-dark drop-shadow-sm">Elements</h1>
                                        <h2 className="text-xl font-medium tracking-[0.4em] text-brand-dark/70">TRAINING BOX</h2>
                                    </div>
                                    
                                    <div className="glass-card p-6 sm:p-8 rounded-[2.5rem] w-full max-w-md">
                                        <h3 className="text-2xl font-black mb-6 text-center">{currentView === 'login' ? 'Bienvenido' : 'Crear Cuenta'}</h3>
                                        {errorMsg && <div className="bg-red-500/10 text-red-700 p-3 rounded-xl mb-6 text-sm font-bold text-center border border-red-500/20">{errorMsg}</div>}
                                        
                                        <form onSubmit={(e) => handleAuth(e, currentView)} className="space-y-4">
                                            {currentView === 'register' && (
                                                <div className="h-64 overflow-y-auto hide-scroll space-y-4 px-1 pb-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Nombres</label><input type="text" name="nombres" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Apellidos</label><input type="text" name="apellidos" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Cédula</label><input type="number" name="cedula" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Teléfono</label><input type="tel" name="telefono" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">EPS</label><input type="text" name="eps" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                        <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Nacimiento</label><input type="date" name="fechaNac" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                                    </div>
                                                    <div className="p-4 bg-brand-dark/5 rounded-xl border border-brand-dark/10 space-y-4">
                                                        <p className="text-[10px] font-black uppercase text-brand-dark/50">Contacto de Emergencia</p>
                                                        <input type="text" name="contactoEmergencia" required placeholder="Nombre y Teléfono" className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" />
                                                        <input type="text" name="parentesco" required placeholder="Parentesco (Ej: Madre)" className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" />
                                                    </div>
                                                </div>
                                            )}
                                            <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Correo Electrónico</label><input type="email" name="email" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                            <div><label className="block text-[10px] font-black mb-1 ml-1 uppercase text-brand-dark">Contraseña</label><input type="password" name="password" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-brand-dark" /></div>
                                            
                                            <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black text-lg mt-2 hover:scale-[1.02] transition-transform shadow-xl">
                                                {loading ? 'Procesando...' : (currentView === 'login' ? 'Entrar al Box' : 'Crear Mi Cuenta')}
                                            </button>
                                        </form>
                                        <div className="mt-6 text-center">
                                            <button onClick={() => setCurrentView(currentView === 'login' ? 'register' : 'login')} className="text-xs font-bold text-brand-dark/80 hover:text-brand-dark underline decoration-2 underline-offset-4">
                                                {currentView === 'login' ? 'No tengo cuenta, registrarme' : 'Ya tengo cuenta, iniciar sesión'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* DASHBOARD */}
                            {user && currentView === 'dashboard' && (
                                <div className="animate-slide-up space-y-4">
                                    {successMsg && <div className="bg-green-500 text-white p-4 rounded-xl text-sm text-center font-bold animate-fade-in shadow-md">{successMsg}</div>}
                                    
                                    {/* ALERTA PERMANENTE DE CADUCIDAD */}
                                    {infoCaducidad && (
                                        <div className={`glass-card p-4 rounded-2xl flex items-center gap-3 border-l-4 shadow-sm ${infoCaducidad.estado === 'vencido' ? 'border-red-600 bg-red-50' : 'border-orange-500 bg-orange-50'}`}>
                                            <AlertCircle className={`w-5 h-5 shrink-0 ${infoCaducidad.estado === 'vencido' ? 'text-red-600' : 'text-orange-600'}`} />
                                            <div>
                                                <p className={`font-black text-[10px] uppercase ${infoCaducidad.estado === 'vencido' ? 'text-red-800' : 'text-orange-800'}`}>Aviso de Suscripción</p>
                                                <p className={`text-xs font-bold ${infoCaducidad.estado === 'vencido' ? 'text-red-700' : 'text-orange-700'}`}>{infoCaducidad.mensaje}</p>
                                            </div>
                                        </div>
                                    )}

                                    {/* DISEÑO COMPACTO: PERFIL Y ESTADÍSTICAS */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="sm:col-span-2 glass-card rounded-[1.5rem] p-4 sm:p-5 flex flex-col justify-between border border-white/50 relative overflow-hidden">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-12 h-12 bg-brand-dark text-brand-bg1 rounded-full flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-white/30">{String(user.name || 'E').charAt(0).toUpperCase()}</div>
                                                    <div>
                                                        <h2 className="text-xl font-black uppercase leading-none text-brand-dark">{String(user.name || 'Atleta').split(' ')[0]}</h2>
                                                        <p className="text-[10px] font-black text-brand-dark/50 uppercase tracking-wider mt-1">{user.plan || 'Sin Plan'}</p>
                                                    </div>
                                                </div>
                                                <div className={`px-3 py-1 rounded-full text-[9px] font-black uppercase shadow-sm ${String(user.status || '').trim().toLowerCase() === 'activo' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>{user.status || 'Aspirante'}</div>
                                            </div>
                                            
                                            <div className="bg-white/40 rounded-xl p-3 flex justify-between items-center text-xs font-bold text-brand-dark/80">
                                                {String(user.plan || '').includes('12 Clases') ? (
                                                    <div className="flex items-center gap-2"><Clock className="w-4 h-4"/> <span>{user.diasRestantes || 0} clases restantes</span></div>
                                                ) : (
                                                    <div className="flex justify-between w-full">
                                                        <span>Ingreso: {formatearFecha(user.ingreso)}</span>
                                                        <span>Vence: {formatearFecha(user.caducidad)}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="flex gap-3 sm:flex-col">
                                            <div className="flex-1 bg-brand-dark text-brand-bg1 p-3 rounded-[1.5rem] flex flex-col justify-center items-center shadow-sm">
                                                <Trophy className="w-5 h-5 mb-1 opacity-70" />
                                                <p className="text-2xl font-black leading-none">{misPuntos}</p>
                                                <p className="text-[9px] font-black opacity-60 uppercase tracking-wider mt-1">Puntos</p>
                                            </div>
                                            <div className="flex-1 bg-orange-500 text-white p-3 rounded-[1.5rem] flex flex-col justify-center items-center shadow-sm relative overflow-hidden">
                                                <Flame className="absolute -left-2 -bottom-2 w-12 h-12 opacity-20" />
                                                <Flame className="w-5 h-5 mb-1 opacity-90 z-10" />
                                                <p className="text-2xl font-black leading-none z-10">{userStreak}</p>
                                                <p className="text-[9px] font-black opacity-90 uppercase tracking-wider mt-1 z-10">Racha Días</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* INSIGNIAS */}
                                    {evidenciasList.filter(e => e.Estado === 'Aprobado').length > 0 && (
                                        <div className="glass-card rounded-[1.5rem] p-4 sm:p-5 border border-white/40">
                                            <h3 className="font-black uppercase text-xs mb-3 flex items-center gap-2"><Trophy className="w-4 h-4 text-yellow-600"/> Mis Insignias Ganadas</h3>
                                            <div className="flex gap-3 overflow-x-auto hide-scroll pb-2">
                                                {evidenciasList.filter(e => e.Estado === 'Aprobado').map((e, idx) => (
                                                    <div key={idx} className="relative group shrink-0">
                                                        <div className="w-14 h-14 bg-gradient-to-br from-yellow-300 to-yellow-600 rounded-full flex items-center justify-center shadow-md border-2 border-white/80 cursor-help hover:scale-110 transition-transform">
                                                            <span className="font-black text-white text-xs">+{e.Puntos}</span>
                                                        </div>
                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block bg-brand-dark text-white text-[10px] px-3 py-1.5 rounded-lg whitespace-nowrap z-50 shadow-xl font-bold">
                                                            {e.Reto}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {String(user.status || '').trim().toLowerCase() === 'activo' && activeChallenges.length > 0 && (
                                        <div className="glass-card rounded-[1.5rem] p-4 sm:p-6 border border-white/40 overflow-hidden shadow-sm">
                                            <div className="flex items-center gap-2 mb-4"><Target className="w-4 h-4 text-brand-dark/70"/><h3 className="font-black uppercase text-sm">Retos Vigentes</h3></div>
                                            
                                            <div className="space-y-3">
                                                {activeChallenges.map((reto, idx) => {
                                                    const titulo = String(reto.Titulo).toLowerCase();
                                                    const esVideo = titulo.includes('video');
                                                    const esRacha = titulo.includes('racha') || titulo.includes('conexión');
                                                    const esAutomatico = esVideo || esRacha;

                                                    const miEvidencia = evidenciasList.find(e => e.Reto === reto.Titulo);
                                                    const estado = miEvidencia ? miEvidencia.Estado : 'Sin Hacer';
                                                    if(estado === 'Aprobado') return null; // Ocultar si ya se completó para dejar espacio a insignias

                                                    let percent = 0; let color = 'bg-brand-dark/20'; let textoProgreso = ''; let accionUi = null;

                                                    if(esVideo) {
                                                        const totalVideos = videos.length;
                                                        const vistos = evidenciasList.filter(e => e.Reto === reto.Titulo && e.Estado === 'Aprobado').length;
                                                        percent = totalVideos > 0 ? (vistos / totalVideos) * 100 : 0;
                                                        textoProgreso = `${vistos}/${totalVideos} Vistos`;
                                                        color = percent >= 100 ? 'bg-green-500' : 'bg-blue-500';
                                                        accionUi = <span className="text-[9px] font-bold text-brand-dark/50 bg-white px-2 py-1 rounded border border-brand-dark/10">Academia</span>;
                                                    } else if (esRacha) {
                                                        const metaDias = titulo.includes('semanal') ? 7 : (titulo.includes('mensual') ? 30 : 2);
                                                        percent = (userStreak / metaDias) * 100;
                                                        if(percent > 100) percent = 100;
                                                        textoProgreso = `${userStreak}/${metaDias} Días`;
                                                        color = percent >= 100 ? 'bg-green-500' : 'bg-orange-500';
                                                        accionUi = <span className="text-[9px] font-bold text-brand-dark/50 bg-white px-2 py-1 rounded border border-brand-dark/10">Automático</span>;
                                                    } else {
                                                        if(estado === 'Pendiente') { percent = 50; color = 'bg-yellow-500'; textoProgreso = 'En revisión'; }
                                                        else { textoProgreso = 'Pendiente'; }

                                                        if (estado === 'Sin Hacer' || estado === 'Rechazado') {
                                                            accionUi = (
                                                                <button onClick={() => setUploadingReto(reto)} className="bg-brand-dark text-brand-bg1 px-3 py-1.5 rounded-lg font-black text-[10px] uppercase shadow-md flex items-center justify-center gap-1 hover:scale-105 transition-transform w-full sm:w-auto">
                                                                    <Upload className="w-3 h-3"/> Adjuntar
                                                                </button>
                                                            );
                                                        } else {
                                                            accionUi = <Clock className="w-5 h-5 text-yellow-500" />;
                                                        }
                                                    }

                                                    return (
                                                        <div key={idx} className="bg-white/50 p-3 rounded-2xl border border-brand-dark/5 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:bg-white transition-colors">
                                                            <div className="flex-1 w-full">
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <h4 className="font-black text-xs text-brand-dark uppercase truncate">{reto.Titulo}</h4>
                                                                    <span className="text-[9px] font-black text-brand-bg1 bg-brand-dark px-2 py-0.5 rounded-md whitespace-nowrap">+{reto.Puntos} pts</span>
                                                                </div>
                                                                <div className="flex items-center gap-2 mt-2">
                                                                    <div className="flex-1 h-1.5 bg-brand-dark/10 rounded-full overflow-hidden">
                                                                        <div className={`h-full ${color} transition-all duration-1000`} style={{width: `${percent}%`}}></div>
                                                                    </div>
                                                                    <span className={`text-[9px] font-black uppercase w-20 text-right text-brand-dark/60`}>
                                                                        {textoProgreso}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                            <div className="shrink-0 w-full sm:w-auto flex justify-end items-center mt-1 sm:mt-0">
                                                                {accionUi}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* HISTORIAL EVIDENCIAS */}
                                    {evidenciasList.filter(e => e.Estado === 'Rechazado' || e.Estado === 'Pendiente').length > 0 && (
                                        <div className="glass-card rounded-[1.5rem] p-4 border border-white/40">
                                            <h3 className="font-black uppercase text-xs mb-3 text-brand-dark/70 flex items-center gap-2"><Clock className="w-3 h-3"/> Historial de Revisiones</h3>
                                            <div className="space-y-2">
                                                {evidenciasList.filter(e => e.Estado === 'Rechazado' || e.Estado === 'Pendiente').map((e, i) => (
                                                    <div key={i} className="bg-white/40 p-3 rounded-xl flex justify-between items-center text-xs border border-white/50">
                                                        <div className="flex-1 pr-2">
                                                            <p className="font-black text-brand-dark uppercase text-[10px]">{e.Reto}</p>
                                                            <p className="text-[10px] font-bold text-brand-dark/60">{e.Fecha}</p>
                                                            {e.Observacion && <p className="text-[9px] text-red-600 font-bold mt-0.5 leading-tight"><Info className="w-3 h-3 inline"/> {e.Observacion}</p>}
                                                        </div>

                                                            {e.Estado}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                </div>

                                <div className="animate-slide-up space-y-6">

                                    </div>

                                                    <button onClick={() => toggleCategory(category)} className="w-full p-5 flex justify-between items-center hover:bg-white/40 transition-colors">
                                                        <div className="flex items-center gap-3">
                                                            <div className="bg-brand-dark text-brand-bg1 w-7 h-7 rounded-full flex items-center justify-center font-black text-xs shadow-inner">{groupedFilteredVideos[category].length}</div>

                                                        </div>
                                                        {expandedCategories[category] ? <ChevronUp className="w-5 h-5 opacity-50"/> : <ChevronDown className="w-5 h-5 opacity-50"/>}
                                                    </button>

                                                        <div className="p-4 sm:p-6 grid grid-cols-1 sm:grid-cols-2 gap-6 bg-black/5 animate-fade-in border-t border-white/20">

                                                                const videoInfo = getVideoData(vid.URL || '');
                                                                // VERIFICAR SI YA ESTÁ RECLAMADO EL VIDEO
                                                                const videoReto = activeChallenges.find(r => String(r.Titulo).toLowerCase().includes('video'));
                                                                const isReclamado = videoReto && evidenciasList.some(e => e.Reto === videoReto.Titulo && e.URL_Evidencia === videoInfo.id && e.Estado === 'Aprobado');

                                                                return (
                                                                    <div key={vIdx} onClick={() => setSelectedVideo(videoInfo)} className="bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-brand-dark/5 flex flex-col group relative">
                                                                        {isReclamado && (
                                                                            <div className="absolute top-3 right-3 z-20 bg-green-500 text-white text-[10px] font-black uppercase px-2 py-1 rounded shadow-md flex items-center gap-1">
                                                                                <CheckCircle className="w-3 h-3" /> Reclamado
                                                                            </div>
                                                                        )}
                                                                        <div className="relative aspect-video bg-brand-dark flex items-center justify-center overflow-hidden">

                                                                                <img src={`https://img.youtube.com/vi/${videoInfo.id}/hqdefault.jpg`} className="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500 group-hover:scale-105" alt={vid.Nombre} />
                                                                            ) : (
                                                                                <Video className="w-12 h-12 text-white/30" />
                                                                            )}
                                                                            <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300"></div>
                                                                            <div className="relative z-10 w-16 h-16 bg-brand-bg1/95 rounded-full flex items-center justify-center shadow-xl backdrop-blur-md group-hover:scale-110 group-hover:bg-brand-bg1 transition-all duration-300">
                                                                                <Play className="w-8 h-8 text-brand-dark translate-x-0.5" />
                                                                            </div>
                                                                        </div>
                                                                        <div className="p-5 flex-1 flex flex-col">
                                                                            <h4 className="font-black text-xl leading-tight uppercase mb-2 text-brand-dark">{vid.Nombre}</h4>
                                                                            <p className="text-sm text-brand-dark/70 font-medium line-clamp-2 mt-auto">{vid.Descripcion}</p>
                                                                        </div>
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                                <div className="animate-slide-up space-y-6">

                                        <div className="grid grid-cols-1 gap-8">
                                            {blogPosts.map((post, idx) => {

                                                    <div key={idx} onClick={() => setSelectedPost({...post, cleanImg: imgUrl})} className="glass-card rounded-[2rem] overflow-hidden group hover:shadow-2xl transition-all duration-300 relative cursor-pointer flex flex-col border border-white/40">

                                                            <div className="h-48 sm:h-72 w-full relative overflow-hidden bg-brand-dark">

                                                            <div className="flex justify-between items-start mb-3">
                                                                <span className="bg-brand-dark text-brand-bg1 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">{post.Etiqueta || 'Novedad'}</span>
                                                                <span className="text-[10px] font-bold text-brand-dark/50 uppercase">{post.Fecha}</span>
                                                            </div>
                                                            <h3 className="text-2xl font-black leading-tight mb-2">{post.Titulo}</h3>
                                                            <p className="font-medium text-brand-dark/70 text-sm mb-4 line-clamp-2">{post['Descripcion Corta'] || post.Descripcion}</p>

                                                            </div>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}

                                        <h2 className="text-4xl font-black uppercase leading-none mt-1">Leaderboard</h2>

                                    </div>
                                    <div className="glass-card rounded-[2rem] overflow-hidden border border-white/40">

                                                    <th className="p-4">Atleta</th>

                                                        <tr key={idx} className={`border-b border-white/30 transition-colors ${idx === 0 ? 'bg-yellow-500/20' : 'hover:bg-white/50'}`}>
                                                            <td className="p-4 pl-6 text-center font-black text-xl text-brand-dark/40">#{idx + 1}</td>

                                                        </tr>
                                                    ))
                                                }
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                                                                            <td key={i} className="p-3 max-w-[200px] truncate text-brand-dark font-medium">{String(row[k] || '')}</td>
                                                                        ))}
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    ) : <div className="p-6 text-center font-bold text-brand-dark/50">No hay datos en esta pestaña.</div>}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                                    <h4 className="font-black text-xl mb-1">{adminEvalEvidencia.Reto}</h4>
                                                    <p className="text-sm font-bold text-brand-dark/70 mb-4">{adminEvalEvidencia.Correo}</p>

                                                            </a>

                                                            </select>
                                                        </div>

                                                            <button type="submit" name="decision" value="Aprobado" disabled={loading} className="w-full bg-green-500 text-white p-4 rounded-xl font-black uppercase hover:bg-green-600 transition-colors shadow-md">{loading ? '...' : `Aprobar (+${adminEvalEvidencia.Puntos})`}</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            ) : (
                                                <div className="space-y-3">
                                                    {adminEvidencias.filter(e => e.Estado === 'Pendiente').length === 0 ? (
                                                        <p className="text-center font-bold text-brand-dark/50 py-4">No hay evidencias pendientes por revisar.</p>
                                                    ) : (
                                                        adminEvidencias.filter(e => e.Estado === 'Pendiente').map((ev, i) => (
                                                            <div key={i} className="bg-white/60 p-3 rounded-2xl border border-brand-dark/10 flex justify-between items-center shadow-sm">
                                                                <div>
                                                                    <p className="text-[10px] font-black uppercase text-brand-dark/50 mb-0.5">{ev.Fecha}</p>
                                                                    <p className="font-black text-brand-dark text-sm leading-tight">{ev.Reto}</p>
                                                                    <p className="text-[10px] font-bold text-brand-dark/70 mt-1">{ev.Correo}</p>
                                                                </div>
                                                                <button onClick={() => setAdminEvalEvidencia(ev)} className="shrink-0 bg-brand-dark text-brand-bg1 px-3 py-2 rounded-xl font-black text-[10px] uppercase shadow-md hover:scale-105 ml-2">Evaluar</button>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {adminTab === 'blog' && (
                                        <div className="glass-card p-6 rounded-[2rem] border border-white/40">

                                            <form onSubmit={handleAdminAddBlog} className="space-y-4">
                                                <div><label className="block text-[10px] font-black uppercase mb-1">Título</label><input type="text" name="titulo" required className="w-full p-3.5 rounded-xl bg-white/50 focus:bg-white outline-none font-bold text-sm" /></div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="block text-[10px] font-black uppercase mb-1">Etiqueta (Ej: Evento)</label><input type="text" name="etiqueta" required className="w-full p-3.5 rounded-xl bg-white/50 font-bold outline-none text-sm" /></div>
                                                    <div><label className="block text-[10px] font-black uppercase mb-1">Autor</label><input type="text" name="autor" className="w-full p-3.5 rounded-xl bg-white/50 font-bold outline-none text-sm" placeholder="Elements" /></div>
                                                </div>
                                                <div><label className="block text-[10px] font-black uppercase mb-1">Resumen</label><textarea name="descCorta" required className="w-full p-3.5 rounded-xl bg-white/50 outline-none font-medium resize-none text-sm h-20"></textarea></div>
                                                <div><label className="block text-[10px] font-black uppercase mb-1">Contenido Completo</label><textarea name="contenido" required className="w-full p-3.5 rounded-xl bg-white/50 outline-none font-medium resize-none text-sm h-32"></textarea></div>
                                                <div>
                                                    <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark/80">Subir Imagen a Drive</label>

                                                        <Camera className="w-5 h-5" /> Escoger Foto
                                                        <input type="file" name="imagen" accept="image/*" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                    </div>
                                                </div>
                                                <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase mt-4 hover:scale-[1.02] shadow-xl">{loading ? 'Subiendo...' : 'Publicar Noticia'}</button>
                                            </form>
                                        </div>
                                    )}

                                </div>
                            )}

                            {user && <BottomNav />}

                            {/* MODAL UPLOAD RETO */}
                            {uploadingReto && (
                                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                    <div className="bg-[#f0e3d1] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in border border-white/20">
                                        <button type="button" onClick={() => {setUploadingReto(null); setPreviewImgUrl(null);}} className="absolute top-4 right-4 bg-brand-dark/10 text-brand-dark p-2 rounded-full hover:bg-brand-dark/20"><X className="w-4 h-4" /></button>
                                        <h3 className="text-xl font-black uppercase mb-2 text-center text-brand-dark">Evidencia</h3>
                                        <p className="text-[10px] font-bold text-brand-dark/60 mb-6 text-center leading-tight uppercase">{uploadingReto.Titulo}</p>
                                        
                                        <form onSubmit={handleEvidenceSubmit} className="space-y-4">
                                            {previewImgUrl ? (
                                                <div className="w-full flex flex-col items-center gap-3">
                                                    <div className="w-full h-48 bg-black/5 rounded-2xl border border-black/10 overflow-hidden flex items-center justify-center relative group">
                                                        <img src={previewImgUrl} className="w-full h-full object-cover" />
                                                        <button type="button" onClick={() => setPreviewImgUrl(null)} className="absolute inset-0 bg-black/50 text-white font-black text-xs uppercase opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">Cambiar Foto</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="relative w-full h-32 rounded-2xl bg-white/60 border-2 border-dashed border-brand-dark/30 hover:border-brand-dark transition-colors flex flex-col items-center justify-center gap-2 font-black cursor-pointer uppercase text-xs tracking-wider">
                                                    <Camera className="w-8 h-8 text-brand-dark/50" />
                                                    <span className="text-brand-dark/50 text-center px-4">Toca para tomar foto</span>
                                                    <input type="file" name="imagen" accept="image/*,video/*" required onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                </div>
                                            )}
                                            
                                            <button type="submit" disabled={loading || !previewImgUrl} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-black uppercase hover:scale-105 shadow-xl transition-transform disabled:opacity-50">{loading ? 'Enviando...' : 'Enviar a Revisión'}</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* MODAL GESTOR DINÁMICO */}
                            {editingGenericRow && (
                                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 modal-overlay animate-fade-in">
                                    <div className="bg-[#f0e3d1] w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl relative animate-zoom-in max-h-[90vh] overflow-y-auto hide-scroll border border-white/20">
                                        <h3 className="text-xl font-black uppercase mb-1 text-center text-brand-dark flex items-center justify-center gap-2"><Database className="w-5 h-5"/> Editor Universal</h3>
                                        <p className="font-bold text-brand-dark/60 mb-6 text-center text-xs">Pestaña: {selectedAdminSheet} | Fila: {editingGenericRow._rowIndex}</p>
                                        
                                        <form onSubmit={handleGenericUpdate} className="space-y-3">
                                            {Object.keys(editingGenericRow).filter(k => k !== '_rowIndex').map((k, i) => (
                                                <div key={i}>
                                                    <label className="block text-[10px] font-black uppercase mb-1 text-brand-dark">{k}</label>
                                                    <input name={k} defaultValue={editingGenericRow[k]} className="w-full p-3 rounded-xl bg-white/60 focus:bg-white outline-none font-medium text-sm text-brand-dark border border-brand-dark/5" />

                                        </form>
                                    </div>
