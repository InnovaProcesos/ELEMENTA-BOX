<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elements Box App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { bg1: '#e5d3bd', bg2: '#d4bca0', dark: '#2a241f', surface: 'rgba(255, 255, 255, 0.45)' } },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'zoom-in': 'zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        zoomIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(42, 36, 31, 0.3); border-radius: 10px; }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .glass-card { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .modal-overlay { background: rgba(42, 36, 31, 0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-gradient-to-br from-brand-bg1 to-brand-bg2 min-h-screen text-brand-dark font-sans selection:bg-brand-dark selection:text-white">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONOS SVG ---
        const Play = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const BookOpen = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Users = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const LogOut = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const UserCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>;
        const Activity = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const VideoIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>;
        const Search = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const ChevronDown = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const ChevronUp = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>;
        const XIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

        // --- CONFIGURACIÓN ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1q7_Mxg8fdtxlz-_whq6bGc8QbqJwTaaEkgyrGgMbnwPe8sHfNkShZgUQnTKWUT99/exec"; 
        const API_SECRET = "ElementsBox_Seguridad_2026";

        // --- UTILIDADES GLOBALES ---
        // Normaliza las llaves de los objetos removiendo espacios y saltos de línea molestos
        const normalizeKeys = (dataArray) => {
            return dataArray.map(obj => {
                const newObj = {};
                for (let key in obj) {
                    newObj[key.trim()] = obj[key];
                }
                return newObj;
            });
        };

        // Identifica y extrae ID de Drive o Youtube
        const getVideoData = (url) => {
            if (!url) return { type: null, id: null };
            
            // Regex para YouTube
            const ytRegExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const ytMatch = url.match(ytRegExp);
            if (ytMatch && ytMatch[2].length === 11) return { type: 'youtube', id: ytMatch[2] };

            // Regex para Google Drive
            const driveMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (driveMatch) return { type: 'drive', id: driveMatch[1] };

            return { type: null, id: null };
        };

        // Convierte un enlace de Drive normal a un enlace de imagen directo
        const normalizeImageUrl = (url) => {
            if (!url) return '';
            const driveMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (driveMatch) {
                return `https://drive.google.com/uc?export=view&id=${driveMatch[1]}`;
            }
            return url;
        };


        function ElementsBoxApp() {
            const [user, setUser] = useState(null); 
            const [currentView, setCurrentView] = useState('login'); 
            const [loading, setLoading] = useState(false);
            const [dataLoading, setDataLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            // Datos
            const [videos, setVideos] = useState([]);
            const [blogPosts, setBlogPosts] = useState([]);
            const [usersList, setUsersList] = useState([]);

            // Estados UI Interactivos
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedCategories, setExpandedCategories] = useState({});
            const [selectedPost, setSelectedPost] = useState(null); // Para el Modal del Blog

            // PERSISTENCIA
            useEffect(() => {
                const sessionUser = localStorage.getItem('elementsSession');
                if(sessionUser) {
                    const parsedUser = JSON.parse(sessionUser);
                    setUser(parsedUser);
                    setCurrentView('dashboard');
                    fetchData(parsedUser.role);
                }
            }, []);

            const apiCall = async (action, payload) => {
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' }, 
                        body: JSON.stringify({ action, payload, apiSecret: API_SECRET })
                    });
                    return await response.json();
                } catch (error) {
                    return { status: 'error', message: 'Error de conexión con el servidor.' };
                }
            };

            const handleAuth = async (e, action) => {
                e.preventDefault();
                setErrorMsg('');
                setLoading(true);
                
                const email = e.target.email.value;
                const password = e.target.password.value;
                const name = action === 'register' ? e.target.name.value : null;

                const res = await apiCall(action, { name, email, password });
                
                if (res.status === 'success') {
                    setUser(res.user);
                    localStorage.setItem('elementsSession', JSON.stringify(res.user)); 
                    setCurrentView('dashboard');
                    fetchData(res.user.role);
                } else {
                    setErrorMsg(res.message);
                }
                setLoading(false);
            };

            const handleLogout = () => {
                setUser(null);
                setCurrentView('login');
                localStorage.removeItem('elementsSession'); 
            };

            const fetchData = async (role) => {
                setDataLoading(true);
                const resVideos = await apiCall('getVideos', {});
                if (resVideos.status === 'success') {
                    // Normalizamos las llaves para evitar el error de los espacios
                    const cleanVideos = normalizeKeys(resVideos.data);
                    setVideos(cleanVideos);
                    
                    // Abrir la primera categoría por defecto
                    if(cleanVideos.length > 0) {
                        const firstCat = cleanVideos[0].Categoria || 'General';
                        setExpandedCategories({ [firstCat]: true });
                    }
                }

                const resBlog = await apiCall('getBlog', {});
                if (resBlog.status === 'success') setBlogPosts(normalizeKeys(resBlog.data));

                if (role === 'admin') {
                    const resUsers = await apiCall('getUsers', { role: 'admin' });
                    if (resUsers.status === 'success') setUsersList(normalizeKeys(resUsers.data));
                }
                setDataLoading(false);
            };

            // PROCESAMIENTO DE VIDEOS PARA LA VISTA ACADEMIA
            const groupedFilteredVideos = useMemo(() => {
                const lowerSearch = searchTerm.toLowerCase();
                
                // 1. Filtrar por búsqueda
                const filtered = videos.filter(v => {
                    const nom = (v.Nombre || '').toLowerCase();
                    const desc = (v.Descripcion || '').toLowerCase();
                    return nom.includes(lowerSearch) || desc.includes(lowerSearch);
                });

                // 2. Agrupar por categoría
                return filtered.reduce((acc, v) => {
                    const cat = v.Categoria || 'General';
                    if (!acc[cat]) acc[cat] = [];
                    acc[cat].push(v);
                    return acc;
                }, {});
            }, [videos, searchTerm]);

            const toggleCategory = (cat) => {
                setExpandedCategories(prev => ({ ...prev, [cat]: !prev[cat] }));
            };


            // COMPONENTES UI REUTILIZABLES
            const Loader = () => (
                <div className="flex justify-center items-center py-12">
                    <div className="w-10 h-10 border-4 border-brand-dark border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            const Topbar = () => (
                <div className="sticky top-0 z-40 bg-brand-bg1/90 backdrop-blur-md px-6 py-4 flex justify-between items-center shadow-sm">
                    <div className="flex items-center gap-2">
                        <div className="bg-brand-dark p-2 rounded-lg">
                            <Activity className="w-6 h-6 text-brand-bg1" />
                        </div>
                        <span className="font-black text-xl tracking-widest uppercase">Elements</span>
                    </div>
                    {user && (
                        <button onClick={handleLogout} className="flex items-center gap-2 p-2 rounded-full hover:bg-black/5 transition-colors text-brand-dark/80 font-bold text-sm">
                            <span className="hidden sm:inline">Cerrar Sesión</span>
                            <LogOut className="w-5 h-5" />
                        </button>
                    )}
                </div>
            );

            const BottomNav = () => (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-brand-dark p-2 rounded-full shadow-2xl flex justify-between items-center z-40 border border-white/10">
                    {['dashboard', 'academy', 'blog', ...(user?.role === 'admin' ? ['admin'] : [])].map(view => {
                        const isApp = currentView === view;
                        const icons = { dashboard: UserCircle, academy: VideoIcon, blog: BookOpen, admin: Users };
                        const labels = { dashboard: 'Perfil', academy: 'Aprende', blog: 'Blog', admin: 'Admin' };
                        const Icon = icons[view];

                        return (
                            <button key={view} onClick={() => setCurrentView(view)} className={`relative flex items-center justify-center p-3 rounded-full transition-all duration-300 ${isApp ? 'bg-brand-bg1 w-28' : 'text-white/50 hover:text-white w-14'}`}>
                                <Icon className={`w-6 h-6 ${isApp ? 'text-brand-dark' : ''}`} />
                                {isApp && <span className="ml-2 text-sm font-bold text-brand-dark animate-fade-in">{labels[view]}</span>}
                            </button>
                        );
                    })}
                </div>
            );

            // RENDER PRINCIPAL
            return (
                <div className="relative font-sans pb-32">
                    {(user || currentView !== 'login') && <Topbar />}

                    <div className="max-w-4xl mx-auto px-4 pt-6">
                        
                        {/* --- LOGIN & REGISTRO --- */}
                        {!user && (currentView === 'login' || currentView === 'register') && (
                            <div className="min-h-[85vh] flex flex-col items-center justify-center animate-slide-up">
                                <div className="mb-8 flex flex-col items-center">
                                    <div className="w-24 h-24 rounded-3xl bg-brand-dark flex items-center justify-center shadow-2xl mb-4 rotate-3">
                                        <Activity className="w-12 h-12 text-brand-bg1 -rotate-3" />
                                    </div>
                                    <h1 className="text-4xl font-black uppercase tracking-widest text-brand-dark drop-shadow-sm">Elements</h1>
                                    <h2 className="text-xl font-medium tracking-[0.4em] text-brand-dark/70">TRAINING BOX</h2>
                                </div>
                                
                                <div className="glass-card p-8 rounded-[2rem] w-full max-w-md">
                                    <h3 className="text-2xl font-black mb-6 text-center">{currentView === 'login' ? 'Bienvenido' : 'Únete al Box'}</h3>
                                    {errorMsg && <div className="bg-red-500/10 text-red-700 p-3 rounded-xl mb-6 text-sm font-bold text-center">{errorMsg}</div>}
                                    
                                    <form onSubmit={(e) => handleAuth(e, currentView)} className="space-y-4">
                                        {currentView === 'register' && (
                                            <div>
                                                <label className="block text-xs font-bold text-brand-dark/60 mb-1 ml-1 uppercase">Nombre</label>
                                                <input type="text" name="name" required className="w-full p-4 rounded-xl bg-white/60 focus:bg-white outline-none transition-all" placeholder="Juan Pérez" />
                                            </div>
                                        )}
                                        <div>
                                            <label className="block text-xs font-bold text-brand-dark/60 mb-1 ml-1 uppercase">Correo</label>
                                            <input type="email" name="email" required className="w-full p-4 rounded-xl bg-white/60 focus:bg-white outline-none transition-all" placeholder="tu@correo.com" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-brand-dark/60 mb-1 ml-1 uppercase">Contraseña</label>
                                            <input type="password" name="password" required className="w-full p-4 rounded-xl bg-white/60 focus:bg-white outline-none transition-all" placeholder="••••••••" />
                                        </div>
                                        <button type="submit" disabled={loading} className="w-full bg-brand-dark text-brand-bg1 p-4 rounded-xl font-bold text-lg mt-4 hover:scale-[1.02] transition-all">
                                            {loading ? 'Procesando...' : (currentView === 'login' ? 'Entrar' : 'Registrarme')}
                                        </button>
                                    </form>
                                    <div className="mt-8 text-center">
                                        <button onClick={() => setCurrentView(currentView === 'login' ? 'register' : 'login')} className="text-sm font-bold text-brand-dark/80 hover:text-brand-dark underline">
                                            {currentView === 'login' ? 'No tengo cuenta, registrarme' : 'Ya tengo cuenta, iniciar sesión'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {user && (
                            <div className="animate-slide-up space-y-8">
                                
                                {/* DASHBOARD */}
                                {currentView === 'dashboard' && (
                                    <div className="space-y-6">
                                        <div className="flex items-end justify-between px-2">
                                            <div>
                                                <p className="text-sm font-bold text-brand-dark/50 uppercase tracking-wider">Perfil</p>
                                                <h2 className="text-4xl font-black uppercase leading-none mt-1">{user.name.split(' ')[0]}</h2>
                                            </div>
                                            <div className="w-14 h-14 bg-brand-dark text-brand-bg1 rounded-full flex items-center justify-center font-black text-2xl shadow-lg">
                                                {user.name.charAt(0).toUpperCase()}
                                            </div>
                                        </div>

                                        <div className="glass-card rounded-[2rem] p-6 relative overflow-hidden">
                                            <div className="flex flex-col gap-4 relative z-10">
                                                <div className="bg-white/50 p-4 rounded-2xl flex justify-between items-center">
                                                    <div>
                                                        <p className="text-xs font-bold text-brand-dark/50 uppercase">Plan Actual</p>
                                                        <p className="text-xl font-black">{user.plan || 'N/A'}</p>
                                                    </div>
                                                    <div className={`px-4 py-2 rounded-full text-xs font-black uppercase shadow-md ${user.status === 'Activo' ? 'bg-green-600 text-white' : 'bg-brand-dark text-brand-bg1'}`}>
                                                        {user.status || 'Activo'}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-brand-dark text-brand-bg1 rounded-[2rem] p-8 text-center relative overflow-hidden shadow-2xl cursor-pointer hover:scale-[1.02] transition-transform" onClick={() => setCurrentView('academy')}>
                                            <Play className="w-12 h-12 mx-auto mb-4 opacity-80" />
                                            <h3 className="text-2xl font-black uppercase mb-2">Academia</h3>
                                            <p className="text-sm opacity-80">Domina nuevos movimientos y mejora tu técnica.</p>
                                        </div>
                                    </div>
                                )}

                                {/* ACADEMIA */}
                                {currentView === 'academy' && (
                                    <div className="space-y-6">
                                        <div className="px-2">
                                            <h2 className="text-4xl font-black uppercase leading-none mt-1">Academia</h2>
                                        </div>

                                        {/* Buscador */}
                                        <div className="relative">
                                            <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-brand-dark/50" />
                                            <input 
                                                type="text" 
                                                placeholder="Buscar por nombre o descripción..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/60 focus:bg-white border-2 border-transparent focus:border-brand-dark outline-none transition-all shadow-sm font-bold text-brand-dark"
                                            />
                                        </div>

                                        {dataLoading ? <Loader /> : (
                                            Object.keys(groupedFilteredVideos).length === 0 ? (
                                                <div className="glass-card p-12 rounded-[2rem] text-center">
                                                    <VideoIcon className="w-12 h-12 mx-auto opacity-20 mb-4" />
                                                    <p className="font-bold opacity-60">No se encontraron videos.</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-4">
                                                    {Object.keys(groupedFilteredVideos).map((category, catIdx) => (
                                                        <div key={catIdx} className="glass-card rounded-[1.5rem] overflow-hidden">
                                                            
                                                            {/* Cabecera del Acordeón */}
                                                            <button 
                                                                onClick={() => toggleCategory(category)}
                                                                className="w-full p-5 flex justify-between items-center bg-white/20 hover:bg-white/40 transition-colors"
                                                            >
                                                                <div className="flex items-center gap-3">
                                                                    <div className="bg-brand-dark text-brand-bg1 w-8 h-8 rounded-full flex items-center justify-center font-black text-sm">
                                                                        {groupedFilteredVideos[category].length}
                                                                    </div>
                                                                    <h3 className="font-black text-xl uppercase tracking-wider">{category}</h3>
                                                                </div>
                                                                {expandedCategories[category] ? <ChevronUp className="w-6 h-6"/> : <ChevronDown className="w-6 h-6"/>}
                                                            </button>

                                                            {/* Contenido (Grilla de Videos) */}
                                                            {expandedCategories[category] && (
                                                                <div className="p-4 grid md:grid-cols-2 gap-4 bg-black/5 animate-fade-in">
                                                                    {groupedFilteredVideos[category].map((vid, vIdx) => {
                                                                        const url = vid.URL || '';
                                                                        const videoInfo = getVideoData(url);

                                                                        return (
                                                                            <div key={vIdx} className="bg-white rounded-[1rem] overflow-hidden shadow-md flex flex-col group">
                                                                                <div className="relative w-full pt-[56.25%] bg-brand-dark/10">
                                                                                    {videoInfo.type === 'youtube' && (
                                                                                        <iframe className="absolute top-0 left-0 w-full h-full" src={`https://www.youtube.com/embed/${videoInfo.id}`} allowFullScreen></iframe>
                                                                                    )}
                                                                                    {videoInfo.type === 'drive' && (
                                                                                        // Google Drive Preview Iframe
                                                                                        <iframe className="absolute top-0 left-0 w-full h-full" src={`https://drive.google.com/file/d/${videoInfo.id}/preview`} allowFullScreen></iframe>
                                                                                    )}
                                                                                    {!videoInfo.type && (
                                                                                        <div className="absolute inset-0 flex flex-col items-center justify-center text-brand-dark/40">
                                                                                            <VideoIcon className="w-8 h-8 mb-2" />
                                                                                            <span className="text-xs font-bold">Enlace no soportado</span>
                                                                                        </div>
                                                                                    )}
                                                                                </div>
                                                                                <div className="p-4 flex-1 flex flex-col">
                                                                                    <h4 className="text-lg font-black leading-tight mb-1">{vid.Nombre}</h4>
                                                                                    <p className="text-sm text-brand-dark/70 font-medium">{vid.Descripcion}</p>
                                                                                </div>
                                                                            </div>
                                                                        )
                                                                    })}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            )
                                        )}
                                    </div>
                                )}

                                {/* BLOG */}
                                {currentView === 'blog' && (
                                    <div className="space-y-6">
                                        <div className="px-2">
                                            <h2 className="text-4xl font-black uppercase leading-none mt-1">Blog Box</h2>
                                        </div>

                                        {dataLoading ? <Loader /> : (
                                            blogPosts.length === 0 ? (
                                                <div className="glass-card p-12 rounded-[2rem] text-center">
                                                    <BookOpen className="w-12 h-12 mx-auto opacity-20 mb-4" />
                                                    <p className="font-bold opacity-60">No hay publicaciones recientes.</p>
                                                </div>
                                            ) : (
                                                <div className="grid md:grid-cols-2 gap-6">
                                                    {blogPosts.map((post, idx) => {
                                                        const imgUrl = normalizeImageUrl(post.URL_Imagen);
                                                        
                                                        return (
                                                            <div key={idx} onClick={() => setSelectedPost({...post, cleanImg: imgUrl})} className="glass-card rounded-[2rem] overflow-hidden group hover:shadow-2xl transition-all duration-300 relative cursor-pointer">
                                                                {imgUrl && (
                                                                    <div className="h-56 overflow-hidden relative">
                                                                        <div className="absolute inset-0 bg-gradient-to-t from-brand-dark/90 via-brand-dark/30 to-transparent z-10"></div>
                                                                        <img src={imgUrl} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={post.Titulo} />
                                                                        
                                                                        <div className="absolute bottom-4 left-5 right-5 z-20">
                                                                            <span className="bg-brand-bg1 text-brand-dark px-3 py-1 rounded-full text-xs font-black shadow-lg mb-2 inline-block">
                                                                                {post.Fecha || 'Novedad'}
                                                                            </span>
                                                                            <h3 className="text-xl font-black text-white leading-tight drop-shadow-md">{post.Titulo}</h3>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                {!imgUrl && (
                                                                    <div className="p-6 bg-brand-dark text-white">
                                                                        <h3 className="text-xl font-black leading-tight mb-2">{post.Titulo}</h3>
                                                                        <span className="bg-brand-bg1 text-brand-dark px-3 py-1 rounded-full text-xs font-black">{post.Fecha}</span>
                                                                    </div>
                                                                )}
                                                                <div className="p-5 bg-white/40">
                                                                    <p className="font-medium text-brand-dark/80 line-clamp-2 text-sm">{post.Descripcion}</p>
                                                                    <p className="text-xs font-black uppercase mt-3 text-brand-dark/50 flex items-center">Leer más <Play className="w-3 h-3 ml-1"/></p>
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )
                                        )}
                                    </div>
                                )}

                                {/* ADMIN */}
                                {currentView === 'admin' && user?.role === 'admin' && (
                                    <div className="space-y-6">
                                        <div className="px-2">
                                            <h2 className="text-4xl font-black uppercase leading-none mt-1">Gestión</h2>
                                        </div>

                                        <div className="glass-card rounded-[2rem] overflow-hidden">
                                            <div className="p-6 bg-white/40 border-b border-white/40 flex items-center gap-3">
                                                <div className="w-10 h-10 bg-brand-dark rounded-full flex justify-center items-center text-brand-bg1"><Users className="w-5 h-5"/></div>
                                                <div>
                                                    <h3 className="font-black text-xl">Atletas</h3>
                                                    <p className="text-xs font-bold text-brand-dark/60">Total: {usersList.length}</p>
                                                </div>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-brand-dark/5 text-xs uppercase font-bold text-brand-dark/60">
                                                            <th className="p-4">Nombre</th>
                                                            <th className="p-4">Plan</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="text-sm">
                                                        {dataLoading ? <tr><td colSpan="2"><Loader/></td></tr> : 
                                                        usersList.map((u, idx) => (
                                                            <tr key={idx} className="border-b border-white/30">
                                                                <td className="p-4">
                                                                    <p className="font-black">{u.Nombre}</p>
                                                                    <p className="text-xs text-brand-dark/50">{u.Correo}</p>
                                                                </td>
                                                                <td className="p-4 font-bold">{u.Plan || 'N/A'}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {user && <BottomNav />}

                        {/* MODAL DEL BLOG (ZOOM) */}
                        {selectedPost && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-fade-in" onClick={() => setSelectedPost(null)}>
                                <div className="bg-brand-bg1 w-full max-w-lg rounded-[2rem] overflow-hidden shadow-2xl relative animate-zoom-in flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                    
                                    <button onClick={() => setSelectedPost(null)} className="absolute top-4 right-4 z-20 bg-brand-dark text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform">
                                        <XIcon className="w-5 h-5" />
                                    </button>

                                    {selectedPost.cleanImg && (
                                        <div className="w-full h-64 shrink-0 bg-black relative">
                                            <img src={selectedPost.cleanImg} className="w-full h-full object-cover" alt="Detalle" />
                                        </div>
                                    )}
                                    
                                    <div className="p-8 overflow-y-auto">
                                        <span className="bg-brand-dark text-brand-bg1 px-3 py-1 rounded-full text-xs font-black mb-4 inline-block tracking-widest uppercase">
                                            {selectedPost.Fecha || 'Anuncio'}
                                        </span>
                                        <h2 className="text-3xl font-black text-brand-dark leading-tight mb-4">{selectedPost.Titulo}</h2>
                                        <div className="text-brand-dark/80 font-medium leading-relaxed whitespace-pre-wrap">
                                            {selectedPost.Descripcion}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ElementsBoxApp />);
    </script>
</body>
</html>
